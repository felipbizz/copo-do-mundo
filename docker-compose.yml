version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: deploy/gcp/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      - DEBUG=True
      - PORT=8080
      - HOST=0.0.0.0
    command: streamlit run main.py --server.port=8080 --server.address=0.0.0.0

